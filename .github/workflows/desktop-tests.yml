name: Desktop tests

on:
  push:
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-tests.yml"
  pull_request:
    paths:
      - "desktop/**"
      - ".github/workflows/desktop-tests.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        working-directory: desktop
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements-dev.txt
      - name: Test
        shell: pwsh
        working-directory: desktop
        run: |
          python -m pytest -q --tb=short --junitxml="pytest-${{ matrix.python-version }}.xml" *> "pytest-${{ matrix.python-version }}.log"
          $testExitCode = $LASTEXITCODE
          Get-Content "pytest-${{ matrix.python-version }}.log"
          exit $testExitCode
      - name: Upload pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.python-version }}
          path: |
            desktop/pytest-${{ matrix.python-version }}.log
            desktop/pytest-${{ matrix.python-version }}.xml
          if-no-files-found: warn
          retention-days: 7
      - name: Publish commit status
        if: always() && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const passed = '${{ job.status }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'desktop-tests/python-${{ matrix.python-version }}',
              description: passed ? 'Desktop tests passed' : 'Desktop tests failed'
            });
