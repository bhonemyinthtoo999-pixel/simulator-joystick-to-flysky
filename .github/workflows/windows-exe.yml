name: Build Windows application

on:
  push:
    paths:
      - "desktop/**"
      - "firmware/arduino-uno/**"
      - "firmware/arduino-mega/**"
      - ".github/workflows/windows-exe.yml"
  pull_request:
    paths:
      - "desktop/**"
      - "firmware/arduino-uno/**"
      - "firmware/arduino-mega/**"
      - ".github/workflows/windows-exe.yml"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  build-windows-exe:
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen
      PYTHONUTF8: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12 x64
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: pip
          cache-dependency-path: |
            desktop/requirements.txt
            desktop/requirements-dev.txt
            desktop/requirements-build.txt

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install application and build dependencies
        working-directory: desktop
        run: |
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet -r requirements-build.txt

      - name: Generate multi-size application icon
        working-directory: desktop
        run: |
          python tools/build_icon.py
          if (-not (Test-Path "assets/SimulatorJoystickToFlySky.ico")) { throw "ICO file was not generated" }
          if ((Get-Item "assets/SimulatorJoystickToFlySky.ico").Length -lt 1024) { throw "Generated ICO is unexpectedly small" }

      - name: Compile and bundle Arduino firmware installer
        shell: pwsh
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

          $assetRoot = "desktop/assets/firmware"
          $hexRoot = Join-Path $assetRoot "hex"
          $toolRoot = Join-Path $assetRoot "tools/avrdude"
          $unoOut = Join-Path $env:RUNNER_TEMP "simjoy-uno-build"
          $megaOut = Join-Path $env:RUNNER_TEMP "simjoy-mega-build"
          New-Item -ItemType Directory -Force -Path $hexRoot, $toolRoot, $unoOut, $megaOut | Out-Null

          arduino-cli compile --fqbn arduino:avr:uno --output-dir $unoOut "firmware/arduino-uno/simjoy_arduino_bridge"
          arduino-cli compile --fqbn arduino:avr:mega:cpu=atmega2560 --output-dir $megaOut "firmware/arduino-mega/simjoy_mega_bridge"

          $unoHex = Get-ChildItem $unoOut -Filter "*.ino.hex" | Where-Object { $_.Name -notlike "*with_bootloader*" } | Select-Object -First 1
          $megaHex = Get-ChildItem $megaOut -Filter "*.ino.hex" | Where-Object { $_.Name -notlike "*with_bootloader*" } | Select-Object -First 1
          if (-not $unoHex) { throw "UNO firmware HEX was not generated" }
          if (-not $megaHex) { throw "Mega firmware HEX was not generated" }
          Copy-Item $unoHex.FullName (Join-Path $hexRoot "simjoy-uno.hex") -Force
          Copy-Item $megaHex.FullName (Join-Path $hexRoot "simjoy-mega.hex") -Force

          $arduinoData = Join-Path $env:LOCALAPPDATA "Arduino15/packages/arduino/tools/avrdude"
          $avrdudePackage = Get-ChildItem $arduinoData -Directory | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $avrdudePackage) { throw "Arduino AVR avrdude package was not found" }
          Copy-Item (Join-Path $avrdudePackage.FullName "*") $toolRoot -Recurse -Force

          $required = @(
            (Join-Path $hexRoot "simjoy-uno.hex"),
            (Join-Path $hexRoot "simjoy-mega.hex"),
            (Join-Path $toolRoot "bin/avrdude.exe"),
            (Join-Path $toolRoot "etc/avrdude.conf")
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) { throw "Missing firmware installer component: $path" }
          }

      - name: Run desktop tests
        working-directory: desktop
        run: python -m pytest -q --tb=short

      - name: Build portable Windows application
        working-directory: desktop
        run: python -m PyInstaller --noconfirm --clean SimulatorJoystickToFlySky.spec

      - name: Smoke-test packaged executable and firmware assets
        shell: pwsh
        working-directory: desktop
        run: |
          $appDir = Resolve-Path "dist\SimulatorJoystickToFlySky"
          $exe = Join-Path $appDir "SimulatorJoystickToFlySky.exe"
          $process = Start-Process -FilePath $exe -ArgumentList "--packaging-smoke-test" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Packaged executable smoke test failed with exit code $($process.ExitCode)"
          }
          $required = @(
            (Join-Path $appDir "_internal/assets/firmware/hex/simjoy-uno.hex"),
            (Join-Path $appDir "_internal/assets/firmware/hex/simjoy-mega.hex"),
            (Join-Path $appDir "_internal/assets/firmware/tools/avrdude/bin/avrdude.exe"),
            (Join-Path $appDir "_internal/assets/firmware/tools/avrdude/etc/avrdude.conf")
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) { throw "Packaged firmware asset missing: $path" }
          }

      - name: Assemble release ZIP
        shell: pwsh
        run: |
          $version = (Select-String -Path "desktop\app\main.py" -Pattern 'APP_VERSION = "([^"]+)"').Matches.Groups[1].Value
          if (-not $version) { throw "Could not read APP_VERSION" }
          $packageName = "SimulatorJoystickToFlySky-Windows-x64-v$version"
          $packageDir = Join-Path "release" $packageName
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "desktop\dist\SimulatorJoystickToFlySky\*" $packageDir -Recurse -Force
          Copy-Item "desktop\README.md" (Join-Path $packageDir "README.md") -Force
          Copy-Item "desktop\assets\SimulatorJoystickToFlySky.png" (Join-Path $packageDir "APP-ICON.png") -Force
          New-Item -ItemType Directory -Force -Path (Join-Path $packageDir "firmware") | Out-Null
          Copy-Item "firmware\arduino-uno" (Join-Path $packageDir "firmware\arduino-uno") -Recurse -Force
          Copy-Item "firmware\arduino-mega" (Join-Path $packageDir "firmware\arduino-mega") -Recurse -Force
          @"
          Simulator Joystick to FlySky v$version
          Windows 10/11 x64 application

          Start: SimulatorJoystickToFlySky.exe
          First run: follow the built-in setup assistant
          One-click firmware: UNO/Nano D9 and Mega 2560 D11
          User settings: %USERPROFILE%\.simulator-joystick-to-flysky\
          "@ | Set-Content -Path (Join-Path $packageDir "START-HERE.txt") -Encoding UTF8
          $zipPath = Join-Path "release" "$packageName.zip"
          Compress-Archive -Path "$packageDir\*" -DestinationPath $zipPath -CompressionLevel Optimal -Force
          $hash = Get-FileHash $zipPath -Algorithm SHA256
          "$($hash.Hash)  $([System.IO.Path]::GetFileName($zipPath))" | Set-Content "$zipPath.sha256" -Encoding ASCII

      - name: Upload Windows application
        uses: actions/upload-artifact@v4
        with:
          name: SimulatorJoystickToFlySky-Windows-x64
          path: |
            release/*.zip
            release/*.zip.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Publish build status
        if: always() && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const passed = '${{ job.status }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'windows-exe/build',
              description: passed ? 'Windows app built with setup assistant and firmware installer' : 'Windows app build failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
