<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="48" y1="464" x2="458" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0636a9"/>
      <stop offset="0.55" stop-color="#087bdc"/>
      <stop offset="1" stop-color="#16ddd0"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.5" stop-color="#aebdcb"/>
      <stop offset="1" stop-color="#526579"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#435568"/>
      <stop offset="1" stop-color="#101b2a"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#001b51" flood-opacity="0.48"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#bg)"/>
  <rect x="26" y="26" width="460" height="460" rx="94" fill="none" stroke="#a8f4ff" stroke-width="5" opacity="0.75"/>
  <circle cx="256" cy="252" r="192" fill="none" stroke="#d7fbff" stroke-width="5" opacity="0.72"/>

  <!-- aircraft silhouette -->
  <g transform="translate(78 77) rotate(-14 58 42)" fill="#f8fdff" stroke="#253d59" stroke-width="5" stroke-linejoin="round">
    <path d="M8 42 L48 35 L86 4 L99 8 L78 37 L117 46 L115 57 L74 52 L93 78 L81 82 L47 55 L12 60 L2 53 Z"/>
  </g>

  <!-- circuit/data path -->
  <g fill="none" stroke="#d8ffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" filter="url(#glow)">
    <path d="M184 166 H221 Q237 166 237 182 V242"/>
    <path d="M205 137 H264 Q281 137 281 154 V211"/>
    <path d="M221 112 H310 Q328 112 328 130 V185"/>
  </g>
  <g fill="#08a9dd" stroke="#e9ffff" stroke-width="5">
    <circle cx="184" cy="166" r="9"/><circle cx="205" cy="137" r="9"/><circle cx="221" cy="112" r="9"/>
    <circle cx="237" cy="242" r="9"/><circle cx="281" cy="211" r="9"/><circle cx="328" cy="185" r="9"/>
  </g>

  <!-- joystick -->
  <g filter="url(#shadow)" stroke="#17283b" stroke-width="7" stroke-linejoin="round">
    <path d="M112 379 L132 302 Q138 279 162 272 H233 Q257 279 263 302 L282 379 Q286 395 268 401 H127 Q108 395 112 379 Z" fill="url(#metal)"/>
    <path d="M132 368 L146 317 H168 L160 368 Z" fill="#172334"/>
    <path d="M256 368 L244 317 H221 L230 368 Z" fill="#172334"/>
    <rect x="176" y="326" width="42" height="15" rx="7" fill="#1c2a3c"/>
    <path d="M174 291 Q157 276 164 249 L180 177 Q184 159 202 159 H212 Q231 161 231 180 L226 251 Q224 276 207 291 Z" fill="url(#dark)"/>
    <ellipse cx="199" cy="289" rx="51" ry="24" fill="#29394d"/>
    <ellipse cx="199" cy="286" rx="35" ry="15" fill="#0c1724"/>
    <path d="M179 177 Q186 153 207 151 Q226 154 232 173 L224 204 Q205 218 185 205 Z" fill="#35475b"/>
    <circle cx="207" cy="174" r="9" fill="#dfeaf2"/>
    <rect x="188" y="191" width="27" height="10" rx="5" fill="#ff4c44" stroke-width="3"/>
    <path d="M139 341 H161 L155 356 H134 Z" fill="#0d99ec" stroke-width="3"/>
    <path d="M238 341 H260 L265 356 H244 Z" fill="#0d99ec" stroke-width="3"/>
  </g>

  <!-- generic trainer transmitter -->
  <g filter="url(#shadow)" stroke="#17283b" stroke-width="7" stroke-linejoin="round">
    <path d="M287 220 L312 190 H414 L438 220 V382 Q438 400 420 400 H304 Q287 400 287 382 Z" fill="url(#dark)"/>
    <path d="M326 191 V166 H401 V191" fill="none" stroke="#23384d" stroke-width="13"/>
    <rect x="309" y="226" width="106" height="46" rx="15" fill="url(#metal)"/>
    <circle cx="334" cy="248" r="8" fill="#26384b"/>
    <circle cx="390" cy="248" r="8" fill="#26384b"/>
    <rect x="353" y="238" width="18" height="20" rx="5" fill="#162536"/>
    <circle cx="333" cy="309" r="37" fill="#111d2b"/>
    <circle cx="333" cy="309" r="23" fill="#31465b"/>
    <circle cx="333" cy="309" r="8" fill="#b8c9d7"/>
    <circle cx="392" cy="309" r="37" fill="#111d2b"/>
    <circle cx="392" cy="309" r="23" fill="#31465b"/>
    <circle cx="392" cy="309" r="8" fill="#b8c9d7"/>
    <rect x="353" y="291" width="18" height="47" rx="7" fill="url(#metal)"/>
    <rect x="318" y="356" width="90" height="28" rx="9" fill="#103f73"/>
  </g>

  <text x="363" y="377" text-anchor="middle" fill="#bff8ff" font-size="19" font-family="Segoe UI, Arial, sans-serif" font-weight="800" letter-spacing="2">AETR</text>

  <!-- small bridge indicator -->
  <g transform="translate(212 429)" fill="none" stroke="#d9ffff" stroke-width="6" stroke-linecap="round">
    <path d="M0 13 H28"/><path d="M60 13 H88"/><path d="M30 13 Q44 -3 58 13 Q44 29 30 13 Z"/>
  </g>
</svg>
